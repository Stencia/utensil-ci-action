name: 'Utensil Scan'
description: 'Scan a repository for dependencies, vulnerabilities, security, compliance, and AI governance.'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-token:
    description: 'Utensil license token (UTENSIL_LICENSE_TOKEN)'
    required: true
  path:
    description: 'Repository path to scan'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at or above severity (critical/high/medium/low)'
    required: false
  github-comment:
    description: 'Post findings as PR comment'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}
  full:
    description: 'Run all network-dependent checks (stale deps, license audit)'
    required: false
    default: 'false'
  upload:
    description: 'Upload results to Utensil API for dashboard'
    required: false
    default: 'false'
  upload-url:
    description: 'Ingest endpoint URL'
    required: false
    default: 'https://api.utensil.tools/api/ingest'
  diff-only:
    description: 'Only report findings on files changed in this PR. Auto-enabled on pull_request events. Set to false to see all findings.'
    required: false
    default: 'auto'
  args:
    description: 'Additional CLI arguments (pass-through)'
    required: false

outputs:
  exit-code:
    description: 'CLI exit code (0 = pass, 2 = threshold exceeded)'
    value: ${{ steps.scan.outputs.exit-code }}
  report-json:
    description: 'Path to the JSON report file'
    value: ${{ steps.scan.outputs.report-path }}
  vuln-count:
    description: 'Total vulnerability count'
    value: ${{ steps.parse.outputs.vuln-count }}
  finding-count:
    description: 'Total security finding count'
    value: ${{ steps.parse.outputs.finding-count }}
  has-findings:
    description: 'True if code pattern findings were detected'
    value: ${{ steps.parse.outputs.has-findings }}

runs:
  using: 'composite'
  steps:
    - name: Download Utensil CLI
      shell: bash
      run: |
        echo "Downloading Utensil CLI for linux-x64..."
        curl -fSL "https://desktop.utensil.tools/Utensil-latest-linux-x64.tar.gz" \
          -o /tmp/utensil.tar.gz
        tar -xzf /tmp/utensil.tar.gz -C /tmp
        chmod +x /tmp/utensil
        echo "/tmp" >> $GITHUB_PATH

    - name: Run scan
      id: scan
      shell: bash
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS="--json"
        if [ "${{ inputs.full }}" = "true" ]; then ARGS="$ARGS --full"; fi
        if [ -n "${{ inputs.fail-on }}" ]; then ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"; fi
        if [ "${{ inputs.github-comment }}" = "true" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUMBER" ]; then
            ARGS="$ARGS --github-comment --pr $PR_NUMBER"
          fi
        fi
        # Diff-only mode: auto-detect PR base ref unless explicitly disabled
        DIFF_ONLY="${{ inputs.diff-only }}"
        if [ "$DIFF_ONLY" = "auto" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -n "$BASE_SHA" ]; then DIFF_ONLY="true"; else DIFF_ONLY="false"; fi
        fi
        if [ "$DIFF_ONLY" = "true" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -n "$BASE_SHA" ] && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            if git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
              ARGS="$ARGS --diff $BASE_SHA"
            elif git fetch --depth=1 origin "$BASE_SHA" >/dev/null 2>&1 && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
              ARGS="$ARGS --diff $BASE_SHA"
            else
              echo "::warning::Could not resolve base commit $BASE_SHA. Running full scan."
            fi
          fi
        fi
        if [ -n "${{ inputs.args }}" ]; then ARGS="$ARGS ${{ inputs.args }}"; fi

        REPORT_PATH="${{ runner.temp }}/utensil-report.json"
        set +e
        utensil ${{ inputs.path }} $ARGS > "$REPORT_PATH" 2>/dev/null
        EXIT_CODE=$?
        set -e

        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report-path=$REPORT_PATH" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 2 ]; then
          echo "::error::Utensil scan found findings exceeding --fail-on ${{ inputs.fail-on }} threshold"
          exit 2
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Utensil scan failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Parse results
      id: parse
      shell: bash
      if: always()
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ -f "$REPORT" ]; then
          VULN_COUNT=$(jq '[.vulnerabilities.vulnerablePackages[]?.totalCount // 0] | add // 0' "$REPORT" 2>/dev/null || echo 0)
          FINDING_COUNT=$(jq '[.intelligence[]? | select(.category == "securityRisk" and (.key | endswith("Summary") | not))] | length' "$REPORT" 2>/dev/null || echo 0)
          echo "vuln-count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "finding-count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          if [ "$FINDING_COUNT" -gt 0 ] 2>/dev/null; then
            if [ "${{ inputs.github-comment }}" = "true" ] && [ -n "${{ github.event.pull_request.number }}" ]; then
              echo "::warning::Utensil found $FINDING_COUNT code pattern finding(s). Review the PR comment for details."
            else
              echo "::warning::Utensil found $FINDING_COUNT code pattern finding(s). Check the scan report artifact."
            fi
            echo "has-findings=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln-count=0" >> $GITHUB_OUTPUT
          echo "finding-count=0" >> $GITHUB_OUTPUT
        fi

    - name: Create check run for findings
      shell: bash
      if: always() && steps.parse.outputs.has-findings == 'true'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        FINDING_COUNT="${{ steps.parse.outputs.finding-count }}"
        REPORT="${{ steps.scan.outputs.report-path }}"

        # Build summary from findings
        SUMMARY="$FINDING_COUNT code pattern finding(s) detected."
        if [ -f "$REPORT" ]; then
          DETAILS=$(jq -r '
            [.intelligence[]?
              | select(.category == "securityRisk" and ((.key // "") | endswith("Summary") | not))
              | .evidence[]?
              | select(.type == "sourceFile")
              | .filePath + (if .lineNumber then ":" + (.lineNumber | tostring) else "" end)
            ] | join(", ")
          ' "$REPORT" 2>/dev/null || echo "")
          if [ -n "$DETAILS" ]; then
            SUMMARY="$SUMMARY Files: $DETAILS"
          fi
        fi

        gh api repos/${{ github.repository }}/check-runs \
          -f name="Utensil Code Patterns" \
          -f head_sha="${{ github.event.pull_request.head.sha || github.sha }}" \
          -f status="completed" \
          -f conclusion="neutral" \
          -f "output[title]=$FINDING_COUNT code pattern finding(s)" \
          -f "output[summary]=$SUMMARY" \
          > /dev/null 2>&1 || echo "::warning::Could not create check run (needs checks: write permission)"

    - name: Upload results
      shell: bash
      if: inputs.upload == 'true' && steps.scan.outputs.report-path != ''
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ ! -f "$REPORT" ]; then exit 0; fi
        PAYLOAD="${{ runner.temp }}/utensil-upload.json"
        RESPONSE_PATH="${{ runner.temp }}/utensil-upload-response.txt"
        jq --arg repo "${{ github.repository }}" \
           --arg ref "${{ github.ref }}" \
           --arg sha "${{ github.sha }}" \
           --arg run_id "${{ github.run_id }}" \
           --arg trigger "${{ github.event_name }}" \
           '{metadata: {repo: $repo, ref: $ref, sha: $sha, run_id: $run_id, trigger: $trigger, uploaded_at: (now | todate)}, report: .}' \
           "$REPORT" > "$PAYLOAD"

        HTTP_CODE=$(curl -sS -o "$RESPONSE_PATH" -w "%{http_code}" \
          -X POST "${{ inputs.upload-url }}" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $UTENSIL_LICENSE_TOKEN" \
          --data-binary @"$PAYLOAD")
        CURL_EXIT=$?

        if [ $CURL_EXIT -ne 0 ] || [ -z "$HTTP_CODE" ]; then
          HTTP_CODE=000
        fi

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::warning::Utensil dashboard upload skipped (${HTTP_CODE}) via ${{ inputs.upload-url }}"
          if [ -s "$RESPONSE_PATH" ]; then
            head -c 500 "$RESPONSE_PATH"
            echo
          fi
        fi
