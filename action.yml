name: 'Utensil Scan'
description: 'Scan a repository for dependencies, vulnerabilities, security, compliance, and AI governance.'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-token:
    description: 'Utensil license token (UTENSIL_LICENSE_TOKEN)'
    required: true
  path:
    description: 'Repository path to scan'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at or above severity (critical/high/medium/low)'
    required: false
  github-comment:
    description: 'Post findings as PR comment'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}
  full:
    description: 'Run all network-dependent checks (stale deps, license audit)'
    required: false
    default: 'false'
  upload:
    description: 'Upload results to Utensil API for dashboard'
    required: false
    default: 'false'
  upload-url:
    description: 'Ingest endpoint URL'
    required: false
    default: 'https://api.utensil.tools/api/ingest'
  args:
    description: 'Additional CLI arguments (pass-through)'
    required: false

outputs:
  exit-code:
    description: 'CLI exit code (0 = pass, 2 = threshold exceeded)'
    value: ${{ steps.scan.outputs.exit-code }}
  report-json:
    description: 'Path to the JSON report file'
    value: ${{ steps.scan.outputs.report-path }}
  vuln-count:
    description: 'Total vulnerability count'
    value: ${{ steps.parse.outputs.vuln-count }}
  finding-count:
    description: 'Total reported security finding count'
    value: ${{ steps.parse.outputs.finding-count }}
  reported-finding-count:
    description: 'Total reported security finding count for the run snapshot'
    value: ${{ steps.parse.outputs.reported-finding-count }}
  active-finding-count:
    description: 'Active security finding count for the run snapshot'
    value: ${{ steps.parse.outputs.active-finding-count }}
  dismissed-finding-count:
    description: 'Dismissed security finding count for the run snapshot'
    value: ${{ steps.parse.outputs.dismissed-finding-count }}

runs:
  using: 'composite'
  steps:
    - name: Download Utensil CLI
      shell: bash
      run: |
        echo "Downloading Utensil CLI for linux-x64..."
        curl -fSL "https://desktop.utensil.tools/Utensil-latest-linux-x64.tar.gz" \
          -o /tmp/utensil.tar.gz
        tar -xzf /tmp/utensil.tar.gz -C /tmp
        chmod +x /tmp/utensil
        echo "/tmp" >> $GITHUB_PATH

    - name: Run scan
      id: scan
      shell: bash
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS="--json"
        if [ "${{ inputs.full }}" = "true" ]; then ARGS="$ARGS --full"; fi
        if [ -n "${{ inputs.fail-on }}" ]; then ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"; fi
        if [ "${{ inputs.github-comment }}" = "true" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUMBER" ]; then
            ARGS="$ARGS --github-comment --pr $PR_NUMBER"
          fi
        fi
        if [ -n "${{ inputs.args }}" ]; then ARGS="$ARGS ${{ inputs.args }}"; fi

        REPORT_PATH="${{ runner.temp }}/utensil-report.json"
        set +e
        utensil ${{ inputs.path }} $ARGS > "$REPORT_PATH" 2>/dev/null
        EXIT_CODE=$?
        set -e

        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report-path=$REPORT_PATH" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 2 ]; then
          echo "::error::Utensil scan found findings exceeding --fail-on ${{ inputs.fail-on }} threshold"
          exit 2
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Utensil scan failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Parse results
      id: parse
      shell: bash
      if: always()
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ -f "$REPORT" ]; then
          VULN_COUNT=$(jq '[.vulnerabilities.vulnerablePackages[]?.totalCount // 0] | add // 0' "$REPORT" 2>/dev/null || echo 0)
          COUNT_FILTER='
            def security_findings:
              [.intelligence[]?
                | select(.category == "securityRisk" and ((.key // "") | endswith("Summary") | not))
              ];
            def run_summary:
              .runSummary // .summary // {};
            def dismissed_flag:
              .dismissedAtScanTime // .dismissed // .isDismissed // false;
            def reported_count:
              if (run_summary.reportedFindingCount? != null) then run_summary.reportedFindingCount
              elif (run_summary.findingCount? != null) then run_summary.findingCount
              else (security_findings | length)
              end;
            def dismissed_count:
              if (run_summary.dismissedFindingCount? != null) then run_summary.dismissedFindingCount
              else ([security_findings[] | select(dismissed_flag == true)] | length)
              end;
            def active_count:
              if (run_summary.activeFindingCount? != null) then run_summary.activeFindingCount
              elif (run_summary.findingCount? != null and run_summary.dismissedFindingCount? != null) then
                (run_summary.findingCount - run_summary.dismissedFindingCount)
              else (reported_count - dismissed_count)
              end;
            {
              reported: (reported_count // 0),
              active: (active_count // 0),
              dismissed: (dismissed_count // 0)
            }
          '
          COUNT_JSON=$(jq -c "$COUNT_FILTER" "$REPORT" 2>/dev/null || echo '{"reported":0,"active":0,"dismissed":0}')
          REPORTED_FINDING_COUNT=$(jq -r '.reported // 0' <<< "$COUNT_JSON")
          ACTIVE_FINDING_COUNT=$(jq -r '.active // 0' <<< "$COUNT_JSON")
          DISMISSED_FINDING_COUNT=$(jq -r '.dismissed // 0' <<< "$COUNT_JSON")
          FINDING_COUNT="$REPORTED_FINDING_COUNT"
          echo "vuln-count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "finding-count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          echo "reported-finding-count=$REPORTED_FINDING_COUNT" >> $GITHUB_OUTPUT
          echo "active-finding-count=$ACTIVE_FINDING_COUNT" >> $GITHUB_OUTPUT
          echo "dismissed-finding-count=$DISMISSED_FINDING_COUNT" >> $GITHUB_OUTPUT
        else
          echo "vuln-count=0" >> $GITHUB_OUTPUT
          echo "finding-count=0" >> $GITHUB_OUTPUT
          echo "reported-finding-count=0" >> $GITHUB_OUTPUT
          echo "active-finding-count=0" >> $GITHUB_OUTPUT
          echo "dismissed-finding-count=0" >> $GITHUB_OUTPUT
        fi

    - name: Upload results
      shell: bash
      if: inputs.upload == 'true' && steps.scan.outputs.report-path != ''
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ ! -f "$REPORT" ]; then exit 0; fi
        PAYLOAD="${{ runner.temp }}/utensil-upload.json"
        RESPONSE_PATH="${{ runner.temp }}/utensil-upload-response.txt"
        jq --arg repo "${{ github.repository }}" \
           --arg ref "${{ github.ref }}" \
           --arg sha "${{ github.sha }}" \
           --arg run_id "${{ github.run_id }}" \
           --arg trigger "${{ github.event_name }}" \
           '
           def security_findings:
             [.intelligence[]?
               | select(.category == "securityRisk" and ((.key // "") | endswith("Summary") | not))
             ];
           def run_summary:
             .runSummary // .summary // {};
           def dismissed_flag:
             .dismissedAtScanTime // .dismissed // .isDismissed // false;
           def finding_identity:
             {
               ruleId: (.ruleId // .ruleIdentifier // .rule // .key // null),
               filePath: (.filePath // .path // .location.path // .location.file // null),
               lineNumber: (.lineNumber // .line // .location.line // null)
             };
           def finding_audit:
             finding_identity + {
               dismissedAtScanTime: dismissed_flag,
               dismissalReason: (.dismissalReason // .suppression.reason // .review.reason // null),
               dismissedBy: (.dismissedBy // .suppression.actor // .review.actor // null),
               dismissedAt: (.dismissedAt // .suppression.timestamp // .review.timestamp // null)
             };
           def reported_count:
             if (run_summary.reportedFindingCount? != null) then run_summary.reportedFindingCount
             elif (run_summary.findingCount? != null) then run_summary.findingCount
             else (security_findings | length)
             end;
           def dismissed_count:
             if (run_summary.dismissedFindingCount? != null) then run_summary.dismissedFindingCount
             else ([security_findings[] | select(dismissed_flag == true)] | length)
             end;
           def active_count:
             if (run_summary.activeFindingCount? != null) then run_summary.activeFindingCount
             elif (run_summary.findingCount? != null and run_summary.dismissedFindingCount? != null) then
               (run_summary.findingCount - run_summary.dismissedFindingCount)
             else (reported_count - dismissed_count)
             end;
           {
             metadata: {
               repo: $repo,
               ref: $ref,
               sha: $sha,
               run_id: $run_id,
               trigger: $trigger,
               uploaded_at: (now | todate)
             },
             runSummary: {
               reportedFindingCount: (reported_count // 0),
               activeFindingCount: (active_count // 0),
               dismissedFindingCount: (dismissed_count // 0)
             },
             findings: [security_findings[] | finding_audit],
             report: .
           }' \
           "$REPORT" > "$PAYLOAD"

        HTTP_CODE=$(curl -sS -o "$RESPONSE_PATH" -w "%{http_code}" \
          -X POST "${{ inputs.upload-url }}" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $UTENSIL_LICENSE_TOKEN" \
          --data-binary @"$PAYLOAD")
        CURL_EXIT=$?

        if [ $CURL_EXIT -ne 0 ] || [ -z "$HTTP_CODE" ]; then
          HTTP_CODE=000
        fi

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::warning::Utensil dashboard upload skipped (${HTTP_CODE}) via ${{ inputs.upload-url }}"
          if [ -s "$RESPONSE_PATH" ]; then
            head -c 500 "$RESPONSE_PATH"
            echo
          fi
        fi
