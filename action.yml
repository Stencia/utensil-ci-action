name: 'Utensil Scan'
description: 'Scan a repository for dependencies, vulnerabilities, security, compliance, and AI governance.'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-token:
    description: 'Utensil license token (UTENSIL_LICENSE_TOKEN)'
    required: true
  path:
    description: 'Repository path to scan'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at or above severity (critical/high/medium/low)'
    required: false
  github-token:
    description: 'GitHub token for PR comments and check runs'
    required: false
    default: ${{ github.token }}
  full:
    description: 'Run all network-dependent checks (stale deps, license audit)'
    required: false
    default: 'false'
  upload:
    description: 'Upload results to Utensil API for dashboard and AI evaluation'
    required: false
    default: 'false'
  upload-url:
    description: 'Ingest endpoint URL'
    required: false
    default: 'https://api.utensil.tools/api/ingest'
  diff-only:
    description: 'Only report findings on files changed in this PR. Auto-enabled on pull_request events. Set to false to see all findings.'
    required: false
    default: 'auto'
  args:
    description: 'Additional CLI arguments (pass-through)'
    required: false

outputs:
  exit-code:
    description: 'CLI exit code (0 = pass, 2 = threshold exceeded)'
    value: ${{ steps.scan.outputs.exit-code }}
  report-json:
    description: 'Path to the JSON report file'
    value: ${{ steps.scan.outputs.report-path }}
  vuln-count:
    description: 'Total vulnerability count'
    value: ${{ steps.parse.outputs.vuln-count }}
  finding-count:
    description: 'Total security finding count'
    value: ${{ steps.parse.outputs.finding-count }}
  has-findings:
    description: 'True if any code pattern findings were detected (including false positives)'
    value: ${{ steps.parse.outputs.has-findings }}
  has-actionable-findings:
    description: 'True if actionable (real_risk or context_dependent) findings exist after AI evaluation'
    value: ${{ steps.report.outputs.has-actionable }}

runs:
  using: 'composite'
  steps:
    - name: Download Utensil CLI
      shell: bash
      run: |
        echo "Downloading Utensil CLI for linux-x64..."
        curl -fSL "https://desktop.utensil.tools/Utensil-latest-linux-x64.tar.gz" \
          -o /tmp/utensil.tar.gz
        tar -xzf /tmp/utensil.tar.gz -C /tmp
        chmod +x /tmp/utensil
        echo "/tmp" >> $GITHUB_PATH

    - name: Run scan
      id: scan
      shell: bash
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS="--json"
        if [ "${{ inputs.full }}" = "true" ]; then ARGS="$ARGS --full"; fi
        if [ -n "${{ inputs.fail-on }}" ]; then ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"; fi
        # PR comment is posted by the action after AI evaluation, not by the CLI
        # Diff-only mode: fetch changed files from GitHub API (no git history needed)
        DIFF_ONLY="${{ inputs.diff-only }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        if [ "$DIFF_ONLY" = "auto" ]; then
          if [ -n "$PR_NUMBER" ]; then DIFF_ONLY="true"; else DIFF_ONLY="false"; fi
        fi
        if [ "$DIFF_ONLY" = "true" ] && [ -n "$PR_NUMBER" ]; then
          DIFF_FILE="${{ runner.temp }}/changed-files.txt"
          : > "$DIFF_FILE"
          PAGE=1
          FETCH_OK=true
          while true; do
            RESP_FILE="${{ runner.temp }}/pr-files-page-${PAGE}.json"
            HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files?per_page=100&page=${PAGE}")
            if [ $? -ne 0 ] || [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::GitHub API returned HTTP $HTTP_CODE fetching changed files. Running full scan."
              rm -f "$RESP_FILE" "$DIFF_FILE"
              FETCH_OK=false
              break
            fi
            BATCH=$(jq -r '.[].filename // empty' "$RESP_FILE")
            rm -f "$RESP_FILE"
            [ -z "$BATCH" ] && break
            echo "$BATCH" >> "$DIFF_FILE"
            PAGE=$((PAGE + 1))
          done
          if [ "$FETCH_OK" = "true" ] && [ -s "$DIFF_FILE" ]; then
            ARGS="$ARGS --diff-files $DIFF_FILE"
          elif [ "$FETCH_OK" = "true" ]; then
            ARGS="$ARGS --diff-files $DIFF_FILE"
          fi
        fi
        if [ -n "${{ inputs.args }}" ]; then ARGS="$ARGS ${{ inputs.args }}"; fi

        REPORT_PATH="${{ runner.temp }}/utensil-report.json"
        set +e
        utensil ${{ inputs.path }} $ARGS > "$REPORT_PATH" 2>/dev/null
        EXIT_CODE=$?
        set -e

        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report-path=$REPORT_PATH" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 2 ]; then
          echo "::error::Utensil scan found findings exceeding --fail-on ${{ inputs.fail-on }} threshold"
          exit 2
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Utensil scan failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Parse results
      id: parse
      shell: bash
      if: always()
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ -f "$REPORT" ]; then
          VULN_COUNT=$(jq '[.vulnerabilities.vulnerablePackages[]?.totalCount // 0] | add // 0' "$REPORT" 2>/dev/null || echo 0)
          FINDING_COUNT=$(jq '[.intelligence[]? | select(.category == "securityRisk" and (.key | endswith("Summary") | not))] | length' "$REPORT" 2>/dev/null || echo 0)
          echo "vuln-count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "finding-count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          if [ "$FINDING_COUNT" -gt 0 ] 2>/dev/null; then
            echo "has-findings=true" >> $GITHUB_OUTPUT
          else
            echo "has-findings=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln-count=0" >> $GITHUB_OUTPUT
          echo "finding-count=0" >> $GITHUB_OUTPUT
          echo "has-findings=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload and evaluate
      id: upload
      shell: bash
      if: inputs.upload == 'true' && steps.scan.outputs.report-path != ''
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ ! -f "$REPORT" ]; then exit 0; fi
        PAYLOAD="${{ runner.temp }}/utensil-upload.json"
        RESPONSE_PATH="${{ runner.temp }}/utensil-ingest-response.json"
        jq --arg repo "${{ github.repository }}" \
           --arg ref "${{ github.ref }}" \
           --arg sha "${{ github.sha }}" \
           --arg run_id "${{ github.run_id }}" \
           --arg trigger "${{ github.event_name }}" \
           --arg source "ci" \
           '{metadata: {repo: $repo, ref: $ref, sha: $sha, run_id: $run_id, trigger: $trigger, source: $source, uploaded_at: (now | todate)}, report: .}' \
           "$REPORT" > "$PAYLOAD"

        HTTP_CODE=$(curl -sS -o "$RESPONSE_PATH" -w "%{http_code}" \
          -X POST "${{ inputs.upload-url }}" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $UTENSIL_LICENSE_TOKEN" \
          --data-binary @"$PAYLOAD")
        CURL_EXIT=$?

        if [ $CURL_EXIT -ne 0 ] || [ -z "$HTTP_CODE" ]; then
          HTTP_CODE=000
        fi

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::warning::Utensil dashboard upload failed (${HTTP_CODE})"
          exit 0
        fi

        echo "response-path=$RESPONSE_PATH" >> $GITHUB_OUTPUT

    - name: Report findings
      id: report
      shell: bash
      if: always() && inputs.upload == 'true' && steps.upload.outputs.response-path != ''
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        RESPONSE="${{ steps.upload.outputs.response-path }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
        REPO="${{ github.repository }}"
        COMMENT_MARKER="<!-- utensil-pr-comment -->"

        echo "has-actionable=false" >> $GITHUB_OUTPUT

        # Parse AI evaluation results from ingest response
        REAL_RISK=$(jq -r '.ai.real_risk // 0' "$RESPONSE" 2>/dev/null || echo 0)
        CONTEXT_DEP=$(jq -r '.ai.context_dependent // 0' "$RESPONSE" 2>/dev/null || echo 0)
        FALSE_POS=$(jq -r '.ai.false_positive // 0' "$RESPONSE" 2>/dev/null || echo 0)
        ACTIONABLE_COUNT=$((REAL_RISK + CONTEXT_DEP))

        FINDING_COUNT="${{ steps.parse.outputs.finding-count }}"
        VULN_COUNT="${{ steps.parse.outputs.vuln-count }}"

        # Skip PR comment when there is nothing to report
        SHOULD_COMMENT=false
        if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null || [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
          SHOULD_COMMENT=true
        fi

        if [ "$SHOULD_COMMENT" = true ] && [ -n "$PR_NUMBER" ]; then
          # Build PR comment
          COMMENT="## Utensil Security Report"$'\n'$'\n'

          if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null; then
            COMMENT+="**$VULN_COUNT vulnerabilities**"$'\n'$'\n'
          fi

          if [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
            COMMENT+="**$ACTIONABLE_COUNT actionable code pattern finding(s)**"
            if [ "$FALSE_POS" -gt 0 ] 2>/dev/null; then
              COMMENT+=" ($FALSE_POS dismissed as false positive by AI)"
            fi
            COMMENT+=$'\n'$'\n'

            # Build findings table: only real_risk and context_dependent
            COMMENT+="| Rule | File | Severity | AI |"$'\n'
            COMMENT+="|------|------|----------|----|"$'\n'
            while IFS=$'\t' read -r key filePath severity verdict; do
              COMMENT+="| $key | $filePath | $severity | $verdict |"$'\n'
            done < <(jq -r '.findings[]? | select(.aiVerdict == "real_risk" or .aiVerdict == "context_dependent") | [.key, (.filePath // ""), (.severity // ""), (if .aiVerdict == "real_risk" then "Risk" elif .aiVerdict == "context_dependent" then "Review" else "" end)] | @tsv' "$RESPONSE" 2>/dev/null)
          fi

          COMMENT+="---"$'\n'
          COMMENT+="*Scanned by [Utensil](https://utensil.tools)*"$'\n'
          COMMENT+="$COMMENT_MARKER"

          # Post or update PR comment
          EXISTING_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X PATCH -f body="$COMMENT" > /dev/null 2>&1 || true
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$COMMENT" > /dev/null 2>&1 || true
          fi
        elif [ -n "$PR_NUMBER" ]; then
          # Clean scan: delete any stale comment from a previous run
          EXISTING_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" 2>/dev/null | head -1)
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X DELETE > /dev/null 2>&1 || true
          fi
        fi

        # Create check run based on AI verdicts
        if [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
          echo "has-actionable=true" >> $GITHUB_OUTPUT
          gh api "repos/$REPO/check-runs" \
            -f name="Utensil Code Patterns" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="neutral" \
            -f "output[title]=$ACTIONABLE_COUNT actionable finding(s)" \
            -f "output[summary]=$ACTIONABLE_COUNT real risk or context-dependent finding(s). $FALSE_POS false positive(s) dismissed." \
            > /dev/null 2>&1 || true
        fi
