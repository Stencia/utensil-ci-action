name: 'Utensil Scan'
description: 'Scan a repository for dependencies, vulnerabilities, security, compliance, and AI governance.'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-token:
    description: 'Utensil license token (UTENSIL_LICENSE_TOKEN)'
    required: true
  path:
    description: 'Repository path to scan'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at or above severity (critical/high/medium/low)'
    required: false
  github-token:
    description: 'GitHub token for PR comments and check runs'
    required: false
    default: ${{ github.token }}
  full:
    description: 'Run all network-dependent checks (stale deps, license audit)'
    required: false
    default: 'false'
  debian-suite:
    description: 'Optional Debian suite override for packaging/security resolution (for example: bookworm)'
    required: false
  debian-arch:
    description: 'Optional Debian architecture override (for example: amd64)'
    required: false
  native-resolvers:
    description: 'Enable native dependency resolution when lockfiles are missing; may execute code from the target repo'
    required: false
  fetch-scan-config:
    description: 'Best-effort fetch of tenant-owned repo scan settings from Utensil before scanning'
    required: false
    default: 'true'
  upload:
    description: 'Upload results to Utensil API for dashboard and AI evaluation'
    required: false
    default: 'false'
  upload-url:
    description: 'Ingest endpoint URL'
    required: false
    default: 'https://api.utensil.tools/api/ingest'
  diff-only:
    description: 'Only report findings on files changed in this PR. Auto-enabled on pull_request events. Set to false to see all findings.'
    required: false
    default: 'auto'
  args:
    description: 'Additional CLI arguments split on shell whitespace; quoted values containing spaces are not preserved'
    required: false
  authorship-provenance-json:
    description: 'Optional raw JSON object or array describing workflow/platform authorship provenance. Escape hatch for advanced cases (multiple entries, custom structural fields). When set, takes precedence over the ai-* typed inputs below.'
    required: false
  ai-provider:
    description: 'AI provider attributing this scan, e.g. "Anthropic", "OpenAI". Setting any ai-* input enables typed-input provenance.'
    required: false
  ai-tool:
    description: 'AI tool name, e.g. "Claude Code", "GitHub Copilot"'
    required: false
  ai-model:
    description: 'AI model identifier, e.g. "claude-sonnet-4-5"'
    required: false
  ai-used-agent:
    description: 'Set to "true" if the AI ran in autonomous/agentic mode'
    required: false
    default: 'false'
  ai-feature:
    description: 'Optional free-form feature label (e.g. "pr-review")'
    required: false
  ai-mode:
    description: 'Optional free-form mode label (e.g. "agentic")'
    required: false
  ai-agent-session-id:
    description: 'Optional AI agent session identifier'
    required: false

outputs:
  exit-code:
    description: 'CLI exit code (0 = pass, 2 = threshold exceeded)'
    value: ${{ steps.scan.outputs.exit-code }}
  report-json:
    description: 'Path to the JSON report file'
    value: ${{ steps.scan.outputs.report-path }}
  config-fetch-status:
    description: 'Status of the optional hosted scan-config fetch'
    value: ${{ steps.scan.outputs.config-fetch-status }}
  vuln-count:
    description: 'Total vulnerability count'
    value: ${{ steps.parse.outputs.vuln-count }}
  finding-count:
    description: 'Total security finding count'
    value: ${{ steps.parse.outputs.finding-count }}
  has-findings:
    description: 'True if any code pattern findings were detected (including false positives)'
    value: ${{ steps.parse.outputs.has-findings }}
  has-actionable-findings:
    description: 'True if actionable (real_risk or context_dependent) findings exist after AI evaluation'
    value: ${{ steps.report.outputs.has-actionable }}

runs:
  using: 'composite'
  steps:
    - name: Download Utensil CLI
      shell: bash
      run: |
        echo "Downloading Utensil CLI for linux-x64..."
        curl -fSL "https://desktop.utensil.tools/Utensil-latest-linux-x64.tar.gz" \
          -o /tmp/utensil.tar.gz
        tar -xzf /tmp/utensil.tar.gz -C /tmp
        chmod +x /tmp/utensil
        echo "/tmp" >> $GITHUB_PATH

    - name: Resolve authorship provenance
      id: provenance
      shell: bash
      env:
        AUTHORSHIP_PROVENANCE_JSON: ${{ inputs.authorship-provenance-json }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
        AI_TOOL: ${{ inputs.ai-tool }}
        AI_MODEL: ${{ inputs.ai-model }}
        AI_USED_AGENT: ${{ inputs.ai-used-agent }}
        AI_FEATURE: ${{ inputs.ai-feature }}
        AI_MODE: ${{ inputs.ai-mode }}
        AI_AGENT_SESSION_ID: ${{ inputs.ai-agent-session-id }}
      run: |
        # Escape hatch: raw JSON wins over typed inputs.
        if [ -n "$AUTHORSHIP_PROVENANCE_JSON" ]; then
          {
            echo "RESOLVED_PROVENANCE_JSON<<EOF_PROVENANCE"
            echo "$AUTHORSHIP_PROVENANCE_JSON"
            echo "EOF_PROVENANCE"
          } >> "$GITHUB_ENV"
          exit 0
        fi
        # No typed inputs supplied: omit the env var entirely.
        if [ -z "$AI_PROVIDER$AI_TOOL$AI_MODEL$AI_FEATURE$AI_MODE$AI_AGENT_SESSION_ID" ] \
           && [ "$AI_USED_AGENT" != "true" ]; then
          exit 0
        fi
        # Build a single entry from typed inputs. Structural fields are stable
        # for the GitHub Actions producer path; see Stencia/utensil-ci-action#15
        # for the schema rationale.
        USED_AGENT=false
        if [ "$AI_USED_AGENT" = "true" ]; then USED_AGENT=true; fi
        # CommitAuthorship is human / vibeCoded / bot (no aiAssisted). An
        # agent-mode AI session is vibeCoded. AI-assisted autocomplete where the
        # user wrote the commits stays human; the tool/provider/model fields
        # still record that AI was involved.
        AUTHORSHIP=human
        if [ "$USED_AGENT" = "true" ]; then
          AUTHORSHIP=vibeCoded
        fi
        ENTRY=$(jq -nc \
          --arg authorship "$AUTHORSHIP" \
          --arg provider "$AI_PROVIDER" \
          --arg tool "$AI_TOOL" \
          --arg model "$AI_MODEL" \
          --arg feature "$AI_FEATURE" \
          --arg mode "$AI_MODE" \
          --arg sessionId "$AI_AGENT_SESSION_ID" \
          --argjson usedAgent "$USED_AGENT" \
          '{
             authorship: $authorship,
             sourceType: "workflowInstrumentation",
             evidenceType: "workflowAttributionSignal",
             attributionScope: "platform",
             evidenceStrength: "weak",
             usedAgent: $usedAgent
           }
           + (if $provider != "" then {provider: $provider} else {} end)
           + (if $tool != "" then {tool: $tool} else {} end)
           + (if $model != "" then {model: $model} else {} end)
           + (if $feature != "" then {feature: $feature} else {} end)
           + (if $mode != "" then {mode: $mode} else {} end)
           + (if $sessionId != "" then {agentSessionId: $sessionId} else {} end)')
        PAYLOAD=$(jq -nc --argjson entry "$ENTRY" '[$entry]')
        echo "RESOLVED_PROVENANCE_JSON=$PAYLOAD" >> "$GITHUB_ENV"

    - name: Run scan
      id: scan
      shell: bash
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        UTENSIL_EXTERNAL_AUTHORSHIP_PROVENANCE_JSON: ${{ env.RESOLVED_PROVENANCE_JSON }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FULL: ${{ inputs.full }}
        INPUT_DEBIAN_SUITE: ${{ inputs.debian-suite }}
        INPUT_DEBIAN_ARCH: ${{ inputs.debian-arch }}
        INPUT_NATIVE_RESOLVERS: ${{ inputs.native-resolvers }}
        INPUT_FETCH_SCAN_CONFIG: ${{ inputs.fetch-scan-config }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_DIFF_ONLY: ${{ inputs.diff-only }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        REPO_FULL_NAME: ${{ github.repository }}
      run: |
        if [ -z "${REPO_NAME:-}" ]; then REPO_NAME="${REPO_FULL_NAME#${REPO_OWNER}/}"; fi

        ACTION_PATH="${GITHUB_ACTION_PATH:-$PWD}"
        CONFIG_JSON="$("$ACTION_PATH/scripts/resolve-scan-config.sh")"
        EFFECTIVE_DEBIAN_SUITE=$(jq -r '.debianSuite // empty' <<< "$CONFIG_JSON")
        EFFECTIVE_DEBIAN_ARCH=$(jq -r '.debianArch // empty' <<< "$CONFIG_JSON")
        EFFECTIVE_NATIVE_RESOLVERS=$(jq -r 'if .nativeResolversEnabled == true then "true" else "false" end' <<< "$CONFIG_JSON")
        SCAN_TARGET_SOURCE=$(jq -r '.scanTargetSource // empty' <<< "$CONFIG_JSON")
        CONFIG_FETCH_STATUS=$(jq -r '.configFetchStatus // "skipped"' <<< "$CONFIG_JSON")

        args=(--json)
        if [ "$INPUT_FULL" = "true" ]; then args+=(--full); fi
        if [ -n "$EFFECTIVE_DEBIAN_SUITE" ]; then args+=(--debian-suite "$EFFECTIVE_DEBIAN_SUITE"); fi
        if [ -n "$EFFECTIVE_DEBIAN_ARCH" ]; then args+=(--debian-arch "$EFFECTIVE_DEBIAN_ARCH"); fi
        if [ "$EFFECTIVE_NATIVE_RESOLVERS" = "true" ]; then args+=(--native-resolvers); fi
        if [ -n "$SCAN_TARGET_SOURCE" ]; then args+=(--scan-target-source "$SCAN_TARGET_SOURCE"); fi
        if [ -n "$INPUT_FAIL_ON" ]; then args+=(--fail-on "$INPUT_FAIL_ON"); fi
        # PR comment is posted by the action after AI evaluation, not by the CLI
        # Diff-only mode: fetch changed files from GitHub API (no git history needed)
        DIFF_ONLY="$INPUT_DIFF_ONLY"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        if [ "$DIFF_ONLY" = "auto" ]; then
          if [ -n "$PR_NUMBER" ]; then DIFF_ONLY="true"; else DIFF_ONLY="false"; fi
        fi
        if [ "$DIFF_ONLY" = "true" ] && [ -n "$PR_NUMBER" ]; then
          DIFF_FILE="${{ runner.temp }}/changed-files.txt"
          : > "$DIFF_FILE"
          PAGE=1
          FETCH_OK=true
          while true; do
            RESP_FILE="${{ runner.temp }}/pr-files-page-${PAGE}.json"
            set +e
            HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files?per_page=100&page=${PAGE}")
            CURL_EXIT=$?
            set -e
            if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::GitHub API returned HTTP $HTTP_CODE fetching changed files. Running full scan."
              rm -f "$RESP_FILE" "$DIFF_FILE"
              FETCH_OK=false
              break
            fi
            BATCH=$(jq -r '.[].filename // empty' "$RESP_FILE")
            rm -f "$RESP_FILE"
            [ -z "$BATCH" ] && break
            echo "$BATCH" >> "$DIFF_FILE"
            PAGE=$((PAGE + 1))
          done
          if [ "$FETCH_OK" = "true" ] && [ -s "$DIFF_FILE" ]; then
            args+=(--diff-files "$DIFF_FILE")
          elif [ "$FETCH_OK" = "true" ]; then
            args+=(--diff-files "$DIFF_FILE")
          fi
        fi
        if [ -n "$INPUT_ARGS" ]; then
          read -r -a EXTRA_ARGS <<< "$INPUT_ARGS"
          args+=("${EXTRA_ARGS[@]}")
        fi

        REPORT_PATH="${{ runner.temp }}/utensil-report.json"
        set +e
        utensil "$INPUT_PATH" "${args[@]}" > "$REPORT_PATH" 2>/dev/null
        EXIT_CODE=$?
        set -e

        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT
        echo "report-path=$REPORT_PATH" >> $GITHUB_OUTPUT
        echo "config-fetch-status=$CONFIG_FETCH_STATUS" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 2 ]; then
          echo "::error::Utensil scan found findings exceeding --fail-on ${{ inputs.fail-on }} threshold"
          exit 2
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Utensil scan failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Parse results
      id: parse
      shell: bash
      if: always()
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ -f "$REPORT" ]; then
          VULN_COUNT=$(jq '[.vulnerabilities.vulnerablePackages[]?.totalCount // 0] | add // 0' "$REPORT" 2>/dev/null || echo 0)
          FINDING_COUNT=$(jq '[.intelligence[]? | select(.category == "securityRisk" and (.key | endswith("Summary") | not))] | length' "$REPORT" 2>/dev/null || echo 0)
          echo "vuln-count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "finding-count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          if [ "$FINDING_COUNT" -gt 0 ] 2>/dev/null; then
            echo "has-findings=true" >> $GITHUB_OUTPUT
          else
            echo "has-findings=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln-count=0" >> $GITHUB_OUTPUT
          echo "finding-count=0" >> $GITHUB_OUTPUT
          echo "has-findings=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload and evaluate
      id: upload
      shell: bash
      if: inputs.upload == 'true' && steps.scan.outputs.report-path != ''
      env:
        UTENSIL_LICENSE_TOKEN: ${{ inputs.license-token }}
      run: |
        REPORT="${{ steps.scan.outputs.report-path }}"
        if [ ! -f "$REPORT" ]; then exit 0; fi
        PAYLOAD="${{ runner.temp }}/utensil-upload.json"
        RESPONSE_PATH="${{ runner.temp }}/utensil-ingest-response.json"
        jq --arg repo "${{ github.repository }}" \
           --arg ref "${{ github.ref }}" \
           --arg sha "${{ github.sha }}" \
           --arg run_id "${{ github.run_id }}" \
           --arg trigger "${{ github.event_name }}" \
           --arg source "ci" \
           --arg config_fetch_status "${{ steps.scan.outputs.config-fetch-status }}" \
           '{metadata: {repo: $repo, ref: $ref, sha: $sha, run_id: $run_id, trigger: $trigger, source: $source, config_fetch_status: $config_fetch_status, uploaded_at: (now | todate)}, report: .}' \
           "$REPORT" > "$PAYLOAD"

        set +e
        HTTP_CODE=$(curl -sS -o "$RESPONSE_PATH" -w "%{http_code}" \
          -X POST "${{ inputs.upload-url }}" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $UTENSIL_LICENSE_TOKEN" \
          --data-binary @"$PAYLOAD")
        CURL_EXIT=$?
        set -e

        if [ $CURL_EXIT -ne 0 ] || [ -z "$HTTP_CODE" ]; then
          HTTP_CODE=000
        fi

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::warning::Utensil dashboard upload failed (${HTTP_CODE})"
          exit 0
        fi

        echo "response-path=$RESPONSE_PATH" >> $GITHUB_OUTPUT

    - name: Report findings
      id: report
      shell: bash
      if: always() && inputs.upload == 'true' && steps.upload.outputs.response-path != ''
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        RESPONSE="${{ steps.upload.outputs.response-path }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
        REPO="${{ github.repository }}"
        COMMENT_MARKER="<!-- utensil-pr-comment -->"

        echo "has-actionable=false" >> $GITHUB_OUTPUT

        # Parse AI evaluation results from ingest response
        REAL_RISK=$(jq -r '.ai.real_risk // 0' "$RESPONSE" 2>/dev/null || echo 0)
        CONTEXT_DEP=$(jq -r '.ai.context_dependent // 0' "$RESPONSE" 2>/dev/null || echo 0)
        FALSE_POS=$(jq -r '.ai.false_positive // 0' "$RESPONSE" 2>/dev/null || echo 0)
        ACTIONABLE_COUNT=$((REAL_RISK + CONTEXT_DEP))

        FINDING_COUNT="${{ steps.parse.outputs.finding-count }}"
        VULN_COUNT="${{ steps.parse.outputs.vuln-count }}"

        # Skip PR comment when there is nothing to report
        SHOULD_COMMENT=false
        if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null || [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
          SHOULD_COMMENT=true
        fi

        if [ "$SHOULD_COMMENT" = true ] && [ -n "$PR_NUMBER" ]; then
          # Build PR comment
          COMMENT="## Utensil Security Report"$'\n'$'\n'

          if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null; then
            COMMENT+="**$VULN_COUNT vulnerabilities**"$'\n'$'\n'
          fi

          if [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
            COMMENT+="**$ACTIONABLE_COUNT actionable code pattern finding(s)**"
            if [ "$FALSE_POS" -gt 0 ] 2>/dev/null; then
              COMMENT+=" ($FALSE_POS dismissed as false positive by AI)"
            fi
            COMMENT+=$'\n'$'\n'

            # Build findings table: only real_risk and context_dependent
            COMMENT+="| Rule | File | Severity | AI |"$'\n'
            COMMENT+="|------|------|----------|----|"$'\n'
            while IFS=$'\t' read -r key filePath severity verdict; do
              COMMENT+="| $key | $filePath | $severity | $verdict |"$'\n'
            done < <(jq -r '.findings[]? | select(.aiVerdict == "real_risk" or .aiVerdict == "context_dependent") | [.key, (.filePath // ""), (.severity // ""), (if .aiVerdict == "real_risk" then "Risk" elif .aiVerdict == "context_dependent" then "Review" else "" end)] | @tsv' "$RESPONSE" 2>/dev/null)
          fi

          COMMENT+="---"$'\n'
          COMMENT+="*Scanned by [Utensil](https://utensil.tools)*"$'\n'
          COMMENT+="$COMMENT_MARKER"

          # Post or update PR comment
          EXISTING_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X PATCH -f body="$COMMENT" > /dev/null 2>&1 || true
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$COMMENT" > /dev/null 2>&1 || true
          fi
        elif [ -n "$PR_NUMBER" ]; then
          # Clean scan: delete any stale comment from a previous run
          EXISTING_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" 2>/dev/null | head -1)
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X DELETE > /dev/null 2>&1 || true
          fi
        fi

        # Create check run based on AI verdicts
        if [ "$ACTIONABLE_COUNT" -gt 0 ] 2>/dev/null; then
          echo "has-actionable=true" >> $GITHUB_OUTPUT
          gh api "repos/$REPO/check-runs" \
            -f name="Utensil Code Patterns" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="neutral" \
            -f "output[title]=$ACTIONABLE_COUNT actionable finding(s)" \
            -f "output[summary]=$ACTIONABLE_COUNT real risk or context-dependent finding(s). $FALSE_POS false positive(s) dismissed." \
            > /dev/null 2>&1 || true
        fi
