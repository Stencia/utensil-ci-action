name: Test Action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Utensil Action
        if: ${{ secrets.UTENSIL_LICENSE_TOKEN != '' }}
        uses: ./
        with:
          license-token: ${{ secrets.UTENSIL_LICENSE_TOKEN }}
          fail-on: critical
          github-comment: 'false'

      - name: Skip when license token is unavailable
        if: ${{ secrets.UTENSIL_LICENSE_TOKEN == '' }}
        run: echo "Skipping action test because UTENSIL_LICENSE_TOKEN is unavailable in this workflow context."
