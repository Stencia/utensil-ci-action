name: Test Action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parse-results tests
        run: bash tests/test-parse-results.sh

  test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CAN_RUN_LICENSED_TEST: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Utensil license token
        if: ${{ env.CAN_RUN_LICENSED_TEST == 'true' }}
        env:
          UTENSIL_LICENSE_TOKEN: ${{ secrets.UTENSIL_LICENSE_TOKEN }}
        run: |
          if [ -z "$UTENSIL_LICENSE_TOKEN" ]; then
            echo "::error::UTENSIL_LICENSE_TOKEN is not configured for this repository."
            exit 1
          fi

      - name: Run Utensil Action
        if: ${{ env.CAN_RUN_LICENSED_TEST == 'true' }}
        uses: ./
        with:
          license-token: ${{ secrets.UTENSIL_LICENSE_TOKEN }}
          fail-on: critical
          github-comment: 'false'

      - name: Skip licensed test for forked pull requests
        if: ${{ env.CAN_RUN_LICENSED_TEST != 'true' }}
        run: echo "Skipping licensed integration test for forked pull requests because repository secrets are unavailable."
