name: Test Action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Codex hook tests
        run: bash tests/test-codex-hooks.sh
      - name: Run parse-results tests
        run: bash tests/test-parse-results.sh
      - name: Run license-key diagnostics tests
        run: bash tests/test-license-key-diagnostics.sh
      - name: Run access-token mint tests
        run: bash tests/test-mint-access-token.sh
      - name: Run PR comment format tests
        run: bash tests/test-pr-comment-format.sh
      - name: Run PR comment warning-path tests
        run: bash tests/test-pr-comment-warning-paths.sh
      - name: Run scan-config resolution tests
        run: bash tests/test-scan-config-resolution.sh
      - name: Run scan-arg assembly tests
        run: bash tests/test-scan-args.sh

  test-scan:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    env:
      CAN_RUN_LICENSED_TEST: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Utensil license key
        if: ${{ env.CAN_RUN_LICENSED_TEST == 'true' }}
        env:
          UTENSIL_LICENSE_KEY: ${{ secrets.UTENSIL_LICENSE_KEY }}
        run: |
          if [ -z "$UTENSIL_LICENSE_KEY" ]; then
            echo "::error::UTENSIL_LICENSE_KEY is not configured for this repository."
            exit 1
          fi

      - name: Run Utensil Action
        if: ${{ env.CAN_RUN_LICENSED_TEST == 'true' }}
        uses: ./
        with:
          license-key: ${{ secrets.UTENSIL_LICENSE_KEY }}
          fail-on: critical

      - name: Skip licensed test for forked pull requests
        if: ${{ env.CAN_RUN_LICENSED_TEST != 'true' }}
        run: echo "Skipping licensed integration test for forked pull requests because repository secrets are unavailable."
